name: Deploy to Github Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deployment:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['25.8.2']

    steps:
      - name: Checking out the latest code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setting up nodejs for building codebase and Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm
        run: pnpm -v

      - name: Installing Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install jq for cache scripts
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Refresh cached content assets
        env:
          POST_FETCH_PAGES: ${{ vars.POST_FETCH_PAGES }}
          LOCALIZE_IMAGE_ASSETS: '1'
        run: |
          # Do not default to fetching all WP post pages here: ~100+ pages/min × 1700+
          # pages can exceed the job timeout and one HTML/rate-limit response breaks jq.
          # Use committed src/assets/cached/posts.json unless the repo Actions variable
          # POST_FETCH_PAGES is set (e.g. 5 for a quick refresh, or a larger cap).
          if [ -n "${POST_FETCH_PAGES:-}" ]; then
            echo "Refreshing posts from API (POST_FETCH_PAGES=${POST_FETCH_PAGES})"
            bash cachescripts/fetch-the-standard-posts.sh
          else
            echo "Skipping fetch-the-standard-posts.sh — using committed posts.json (set POST_FETCH_PAGES to enable)."
          fi
          bash cachescripts/fetch-the-standard-categories.sh
          bash cachescripts/fetch-image-urls.sh
          bash cachescripts/build-story-pages-index.sh

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Add .nojekyll file
        run: touch ./dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./dist