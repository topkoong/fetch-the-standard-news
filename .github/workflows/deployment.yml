name: Deploy to Github Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

# Required for peaceiris/actions-gh-pages when using GITHUB_TOKEN (push to gh-pages branch).
permissions:
  contents: write

jobs:
  deployment:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['25.8.2']

    steps:
      - name: Checking out the latest code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setting up nodejs for building codebase and Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm
        run: pnpm -v

      - name: Install jq for cache scripts
        run: sudo apt-get update && sudo apt-get install -y jq

      # Order matters: story-pages index needs posts + categories + image URL map.
      # Install app dependencies only after cache JSON is built (scripts need bash + jq only).

      - name: Fetch posts
        env:
          POST_FETCH_PAGES: ${{ vars.POST_FETCH_PAGES }}
        run: |
          if [ -z "${POST_FETCH_PAGES:-}" ] && [ -f "src/assets/cached/posts.json" ]; then
            echo "Skipping — using committed posts.json"
          else
            bash cachescripts/fetch-the-standard-posts.sh
          fi

      - name: Fetch categories
        run: bash cachescripts/fetch-the-standard-categories.sh

      - name: Fetch image URLs
        run: bash cachescripts/fetch-image-urls.sh
        env:
          LOCALIZE_IMAGE_ASSETS: "0"

      - name: Build story pages index
        run: bash cachescripts/build-story-pages-index.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Add .nojekyll file
        run: touch ./dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
